name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Erlang/OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27' # Specify your preferred OTP version
          gleam-version: '1.17.0' # Specify your local Gleam version
          rebar3-version: '3.27.0'

      - name: Download Gleam dependencies
        run: gleam deps download

      - name: Build Lustre SPA
        run: |
          mkdir -p dist
          gleam run -m lustre/dev build --minify

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./
          branch: gh-pages # The isolated branch GitHub Pages will read from
          clean: true